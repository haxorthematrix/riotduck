# Predefined RF allocations for riotduck.
#
# These are convenience presets; reference them from your user config with:
#
#   ranges:
#     - use: ism_433
#       overrides:
#         bin_hz: 2000
#         short_burst: true
#
# Frequencies are in Hz. Allocations follow common regional usage; verify
# against your local regulator before relying on these for compliance.

ranges:
  - name: ism_433
    f_start: 433.05e+6
    f_end:   434.79e+6
    bin_hz:  4000
    short_burst: true
    description: "ITU Region 1 ISM / US Part 15 — fobs, weather, garage doors"

  - name: ism_315
    f_start: 314.0e+6
    f_end:   316.0e+6
    bin_hz:  2000
    short_burst: true
    description: "NA OEM remotes, TPMS, low-end fobs"

  - name: ism_868
